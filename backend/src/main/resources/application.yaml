spring:
  application:
    name: backend

  datasource:
    url: jdbc:mysql://localhost:3306/rag_system?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 277353
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis
  data:
    redis:
      host: 192.168.234.128
      port: 6379
      password: 123456
      database: 0
      timeout: 5000ms

  # AI
  ai:
    # OpenAI
    openai:
      api-key: sk-8b0e3d69c8e1438e8150b5132feffc54
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      chat:
        options:
          model: qwen3.6-plus
          temperature: 0.7
      embedding:
        options:
          model: text-embedding-v4
      # 增加超时时间
      client:
        connect-timeout: 60000
        read-timeout: 120000

    # Qdrant
    vectorstore:
      qdrant:
        host: 192.168.234.128
        port: 6334  # gRPC端口，HTTP REST API端口是6333
        collection-name: rag_collection
        api-key:
        use-tls: false

  # Spring MVC 超时配置
  mvc:
    async:
      request-timeout: 120000  # 异步请求超时120秒

# MyBatis Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

# Sa-Token ??
sa-token:
  token-name: rag-token
  timeout: 2592000
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: true
  jwt-secret-key: your-jwt-secret-key

# log
logging:
  level:
    com.rag: DEBUG
    org.springframework.ai: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# 文件上传配置
file:
  upload-dir: uploads
  max-size: 52428850  # 50MB

# server
server:
  port: 8080
  servlet:
    session:
      timeout: 30m

# health
management:
  endpoints:
    web:
      exposure:
      include: health,info
